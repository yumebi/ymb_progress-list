name: Release

on:
  push:
    branches:
      - main

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute next version (各桁9で繰り上げ)
        id: next
        run: |
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            let [major, minor, patch] = pkg.version.split(".").map(Number);
            patch += 1;
            if (patch > 9) { patch = 0; minor += 1; }
            if (minor > 9) { minor = 0; major += 1; }
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${major}.${minor}.${patch}\n`);
          '

      - name: Bump package.json / package-lock.json
        run: npm version ${{ steps.next.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Bump tauri.conf.json / Cargo.toml / Cargo.lock
        run: |
          node -e '
            const fs = require("fs");
            const next = process.argv[1];

            const confPath = "src-tauri/tauri.conf.json";
            fs.writeFileSync(confPath, fs.readFileSync(confPath, "utf8").replace(/"version":\s*"[^"]+"/, `"version": "${next}"`));

            const tomlPath = "src-tauri/Cargo.toml";
            fs.writeFileSync(tomlPath, fs.readFileSync(tomlPath, "utf8").replace(/^version = "[^"]+"/m, `version = "${next}"`));

            const lockPath = "src-tauri/Cargo.lock";
            fs.writeFileSync(lockPath, fs.readFileSync(lockPath, "utf8").replace(/(name = "progress-list"\nversion = ")[^"]+(")/, `$1${next}$2`));
          ' ${{ steps.next.outputs.version }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock
          git commit -m "chore: bump version to v${{ steps.next.outputs.version }}"
          git push

  release:
    needs: bump-version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Get version
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ steps.version.outputs.version }}
          releaseName: "progress-list v${{ steps.version.outputs.version }}"
          releaseBody: "progress-list v${{ steps.version.outputs.version }} のインストーラーです。"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
